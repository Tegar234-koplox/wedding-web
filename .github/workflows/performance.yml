name: Production performance gate

on:
  workflow_dispatch:
    inputs:
      url:
        description: Public page URL to audit
        required: false
        default: https://www.niskalastudio.site/id
        type: string
  schedule:
    - cron: "11 4 * * 2"

permissions:
  contents: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    env:
      AUDIT_URL: ${{ inputs.url || vars.PERFORMANCE_URL || secrets.PERFORMANCE_URL || 'https://www.niskalastudio.site/id' }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate production audit URL
        shell: bash
        run: |
          case "$AUDIT_URL" in
            https://www.niskalastudio.site|https://www.niskalastudio.site/*) ;;
            *)
              echo "::error::AUDIT_URL must target https://www.niskalastudio.site"
              exit 1
              ;;
          esac
      - uses: treosh/lighthouse-ci-action@v12
        with:
          urls: ${{ env.AUDIT_URL }}
          configPath: ./lighthouserc.cjs
          uploadArtifacts: true
          temporaryPublicStorage: false
