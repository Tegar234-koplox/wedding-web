name: Deployment smoke test

on:
  workflow_dispatch:
    inputs:
      site_url:
        description: Production or preview frontend origin
        required: true
        type: string
      api_url:
        description: Production or staging API origin
        required: true
        type: string
      expected_environment:
        description: Optional deployment environment marker
        required: false
        type: string
      expected_release:
        description: Optional deployed commit SHA
        required: false
        type: string

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Verify deployed services
        run: >-
          python infra/deployment/smoke_test.py
          --site-url "${{ inputs.site_url }}"
          --api-url "${{ inputs.api_url }}"
          ${{ inputs.expected_environment && format('--expected-environment "{0}"', inputs.expected_environment) || '' }}
          ${{ inputs.expected_release && format('--expected-release "{0}"', inputs.expected_release) || '' }}
