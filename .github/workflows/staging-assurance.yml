name: Staging security and load assurance

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * 3"

permissions:
  contents: read

jobs:
  zap-baseline:
    runs-on: ubuntu-latest
    env:
      STAGING_FRONTEND_URL: ${{ secrets.STAGING_FRONTEND_URL }}
      STAGING_API_URL: ${{ secrets.STAGING_API_URL }}
    steps:
      - uses: actions/checkout@v7
      - name: Require isolated staging targets
        run: test -n "$STAGING_FRONTEND_URL" && test -n "$STAGING_API_URL"
      - name: Scan frontend
        run: |
          docker run --rm -v "$PWD:/zap/wrk/:rw" -t ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t "$STAGING_FRONTEND_URL" -m 3 -J zap-frontend.json -r zap-frontend.html
      - name: Scan API
        run: |
          docker run --rm -v "$PWD:/zap/wrk/:rw" -t ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t "$STAGING_API_URL" -m 3 -J zap-api.json -r zap-api.html
      - name: Upload ZAP reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-reports
          path: |
            zap-frontend.json
            zap-frontend.html
            zap-api.json
            zap-api.html
          retention-days: 30

  k6-load:
    runs-on: ubuntu-latest
    env:
      K6_FRONTEND_URL: ${{ secrets.STAGING_FRONTEND_URL }}
      K6_API_URL: ${{ secrets.STAGING_API_URL }}
      K6_PUBLIC_SLUG: ${{ secrets.STAGING_DEMO_INVITATION_SLUG }}
      K6_PREVIEW_TOKEN: ${{ secrets.STAGING_DEMO_PREVIEW_TOKEN }}
      K6_GUEST_TOKEN: ${{ secrets.STAGING_DEMO_GUEST_TOKEN }}
    steps:
      - uses: actions/checkout@v7
      - name: Require isolated staging targets
        run: test -n "$K6_FRONTEND_URL" && test -n "$K6_API_URL"
      - uses: grafana/setup-k6-action@v1
      - uses: grafana/run-k6-action@v1
        with:
          path: infra/performance/k6_staging.js
