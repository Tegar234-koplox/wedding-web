version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      frontend-minor-patch:
        update-types: [minor, patch]
  - package-ecosystem: pip
    directory: /apps/api
    schedule:
      interval: weekly
    groups:
      backend-minor-patch:
        update-types: [minor, patch]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
