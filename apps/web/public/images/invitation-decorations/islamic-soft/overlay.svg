<?xml version="1.0" encoding="UTF-8"?>
<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="diamondFill" cx="42%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="28%" stop-color="#f7fbff" stop-opacity="0.95"/>
      <stop offset="58%" stop-color="#dfe8f2" stop-opacity="0.82"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.18"/>
    </radialGradient>

    <linearGradient id="facetStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="45%" stop-color="#d8e2ee"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>

    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="sparkleGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <symbol id="diamond" viewBox="-60 -60 120 120">
      <path d="M0 -54 L44 -16 L28 44 L0 58 L-28 44 L-44 -16 Z"
            fill="url(#diamondFill)"
            stroke="url(#facetStroke)"
            stroke-width="2"
            opacity="0.92"/>
      <path d="M0 -54 L0 58 M-44 -16 L44 -16 M-28 44 L0 -54 L28 44"
            fill="none"
            stroke="#ffffff"
            stroke-width="1.2"
            opacity="0.45"/>
      <path d="M-26 -18 L0 -54 L26 -18 L0 -4 Z"
            fill="#ffffff"
            opacity="0.28"/>
      <circle cx="-16" cy="-24" r="4" fill="#ffffff" opacity="0.85"/>
    </symbol>

    <symbol id="sparkle" viewBox="-32 -32 64 64">
      <path d="M0 -30 L7 -7 L30 0 L7 7 L0 30 L-7 7 L-30 0 L-7 -7 Z"
            fill="#ffffff"
            opacity="0.92"/>
      <circle cx="0" cy="0" r="3" fill="#ffffff"/>
    </symbol>
