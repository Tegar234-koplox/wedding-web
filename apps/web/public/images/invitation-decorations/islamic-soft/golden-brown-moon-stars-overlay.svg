<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldBrown" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B88A44"/>
      <stop offset="45%" stop-color="#D8B46A"/>
      <stop offset="100%" stop-color="#7A4F24"/>
    </linearGradient>

    <linearGradient id="softGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E2C682" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#8A5A2B" stop-opacity="0.85"/>
    </linearGradient>

    <filter id="softShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#6F451E" flood-opacity="0.18"/>
    </filter>

    <filter id="tinyGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.6" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.7  0 1 0 0 0.48  0 0 1 0 0.18  0 0 0 0.35 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <symbol id="crescent" viewBox="0 0 120 120">
      <path d="M78.8 12.8C55.6 17.4 38 37.9 38 62.5C38 87.6 56.2 108.4 80.1 112.2C70.4 117.3 59 119.7 47.2 117.8C20.1 113.4 1.7 87.8 6.1 60.7C10.5 33.7 36.1 15.2 63.2 19.6C68.9 20.5 74.1 22.3 78.8 24.8C75.8 21.2 75.8 16.5 78.8 12.8Z" fill="url(#goldBrown)" opacity="0.88"/>
      <path d="M78.8 12.8C55.6 17.4 38 37.9 38 62.5C38 87.6 56.2 108.4 80.1 112.2" stroke="#6F451E" stroke-opacity="0.34" stroke-width="2.4" stroke-linecap="round"/>
    </symbol>

    <symbol id="star4" viewBox="0 0 80 80">
      <path d="M40 4L47.9 32.1L76 40L47.9 47.9L40 76L32.1 47.9L4 40L32.1 32.1L40 4Z" fill="url(#softGold)" opacity="0.9"/>
      <path d="M40 16L45.2 34.8L64 40L45.2 45.2L40 64L34.8 45.2L16 40L34.8 34.8L40 16Z" fill="#F1D99A" fill-opacity="0.32"/>
    </symbol>

    <symbol id="star8" viewBox="0 0 90 90">
      <path d="M45 3L52.6 28.7L76.8 13.2L61.3 37.4L87 45L61.3 52.6L76.8 76.8L52.6 61.3L45 87L37.4 61.3L13.2 76.8L28.7 52.6L3 45L28.7 37.4L13.2 13.2L37.4 28.7L45 3Z" fill="url(#goldBrown)" opacity="0.76"/>
      <circle cx="45" cy="45" r="8" fill="#F3DCA1" fill-opacity="0.38"/>
    </symbol>

    <symbol id="dotStar" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="4.8" fill="url(#softGold)" opacity="0.72"/>
      <circle cx="12" cy="12" r="2" fill="#F8E7B5" fill-opacity="0.55"/>
    </symbol>
  </defs>

  <!-- Transparent background by design -->
  <g filter="url(#softShadow)">
    <!-- Large soft corner cluster -->
    <g transform="translate(76 74) rotate(-12)">
      <use href="#crescent" width="118" height="118"/>
      <use href="#star4" x="118" y="10" width="46" height="46" filter="url(#tinyGlow)"/>
      <use href="#star8" x="32" y="128" width="42" height="42"/>
      <use href="#dotStar" x="154" y="86" width="18" height="18"/>
      <use href="#dotStar" x="8" y="170" width="14" height="14"/>
    </g>

    <g transform="translate(930 58) rotate(18) scale(0.9)">
      <use href="#crescent" width="126" height="126"/>
      <use href="#star8" x="126" y="28" width="48" height="48" filter="url(#tinyGlow)"/>
      <use href="#star4" x="36" y="142" width="36" height="36"/>
      <use href="#dotStar" x="192" y="110" width="16" height="16"/>
    </g>

    <g transform="translate(102 568) rotate(10) scale(0.82)">
      <use href="#crescent" width="110" height="110"/>
      <use href="#star4" x="102" y="-18" width="42" height="42" filter="url(#tinyGlow)"/>
      <use href="#star8" x="142" y="82" width="34" height="34"/>
      <use href="#dotStar" x="32" y="134" width="18" height="18"/>
    </g>

    <g transform="translate(958 606) rotate(-18) scale(0.78)">
      <use href="#crescent" width="118" height="118"/>
      <use href="#star4" x="-28" y="36" width="42" height="42" filter="url(#tinyGlow)"/>
      <use href="#star8" x="118" y="112" width="38" height="38"/>
      <use href="#dotStar" x="166" y="32" width="16" height="16"/>
    </g>
  </g>

  <!-- Scattered decorative stars -->
  <g opacity="0.78" filter="url(#tinyGlow)">
    <use href="#star4" x="244" y="116" width="30" height="30"/>
    <use href="#star8" x="368" y="74" width="28" height="28"/>
    <use href="#star4" x="594" y="138" width="24" height="24"/>
    <use href="#star8" x="742" y="88" width="31" height="31"/>
    <use href="#star4" x="828" y="206" width="22" height="22"/>

    <use href="#star8" x="222" y="376" width="24" height="24"/>
    <use href="#star4" x="406" y="310" width="28" height="28"/>
    <use href="#star8" x="552" y="422" width="22" height="22"/>
    <use href="#star4" x="706" y="338" width="26" height="26"/>
    <use href="#star8" x="876" y="402" width="24" height="24"/>

    <use href="#star4" x="306" y="646" width="22" height="22"/>
    <use href="#star8" x="472" y="708" width="28" height="28"/>
    <use href="#star4" x="650" y="632" width="24" height="24"/>
    <use href="#star8" x="804" y="704" width="26" height="26"/>
  </g>

  <!-- Fine golden dots for soft bright-theme blending -->
  <g opacity="0.52">
    <use href="#dotStar" x="314" y="220" width="13" height="13"/>
    <use href="#dotStar" x="486" y="184" width="10" height="10"/>
    <use href="#dotStar" x="674" y="224" width="12" height="12"/>
    <use href="#dotStar" x="930" y="292" width="11" height="11"/>
    <use href="#dotStar" x="164" y="314" width="10" height="10"/>
    <use href="#dotStar" x="350" y="462" width="12" height="12"/>
    <use href="#dotStar" x="520" y="532" width="10" height="10"/>
    <use href="#dotStar" x="790" y="508" width="13" height="13"/>
    <use href="#dotStar" x="1018" y="470" width="10" height="10"/>
    <use href="#dotStar" x="244" y="720" width="11" height="11"/>
    <use href="#dotStar" x="596" y="734" width="9" height="9"/>
    <use href="#dotStar" x="892" y="630" width="12" height="12"/>
  </g>

  <!-- Very subtle decorative arcs -->
  <g stroke="url(#goldBrown)" stroke-width="1.5" stroke-linecap="round" opacity="0.22">
    <path d="M170 212C274 154 374 152 476 214"/>
    <path d="M718 196C812 134 926 144 1016 220"/>
    <path d="M196 522C306 472 428 482 524 554"/>
    <path d="M676 560C784 488 914 500 1016 594"/>
  </g>
</svg>
