<?xml version="1.0" encoding="UTF-8"?>
<svg width="720" height="720" viewBox="0 0 720 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="silverMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="18%" stop-color="#cfcfcf"/>
      <stop offset="38%" stop-color="#f7f7f7"/>
      <stop offset="58%" stop-color="#aeb0b3"/>
      <stop offset="82%" stop-color="#ececec"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>

    <linearGradient id="silverSoft" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="42%" stop-color="#d0d2d6" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.25"/>
    </linearGradient>

    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="sparkleGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="1.3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(0,0)">
    <path d="M58 572 C92 332, 222 122, 565 55"
          fill="none"
          stroke="url(#silverMain)"
          stroke-width="30"
          stroke-linecap="round"
          opacity="0.96"
          filter="url(#softGlow)"/>

    <path d="M92 512 C132 312, 260 180, 510 92"
          fill="none"
          stroke="url(#silverSoft)"
          stroke-width="13"
          stroke-linecap="round"
          opacity="0.82"/>

    <path d="M132 615 C176 350, 332 210, 630 142"
          fill="none"
          stroke="url(#silverMain)"
          stroke-width="7"
          stroke-linecap="round"
          opacity="0.55"/>

    <path d="M72 420 C190 368, 312 292, 396 168"
          fill="none"
          stroke="#ffffff"
          stroke-width="3.5"
          stroke-linecap="round"
          opacity="0.72"/>

    <path d="M190 566 C245 425, 370 312, 580 245"
          fill="none"
          stroke="#bfc1c5"
          stroke-width="4"
          stroke-linecap="round"
          opacity="0.42"/>

    <path d="M104 604 C150 560, 202 522, 268 492"
          fill="none"
          stroke="url(#silverSoft)"
          stroke-width="12"
          stroke-linecap="round"
          opacity="0.58"/>

    <path d="M492 102 C536 88, 580 76, 626 70"
          fill="none"
          stroke="url(#silverSoft)"
          stroke-width="10"
          stroke-linecap="round"
          opacity="0.56"/>

    <g fill="#ffffff" opacity="0.9" filter="url(#sparkleGlow)">
      <path d="M472 130 l8 19 l19 8 l-19 8 l-8 19 l-8 -19 l-19 -8 l19 -8z"/>
      <path d="M172 470 l6 14 l14 6 l-14 6 l-6 14 l-6 -14 l-14 -6 l14 -6z" opacity="0.75"/>
      <circle cx="310" cy="255" r="4.5" opacity="0.68"/>
      <circle cx="548" cy="190" r="3.5" opacity="0.55"/>
      <circle cx="112" cy="552" r="3.8" opacity="0.55"/>
    </g>
  </g>
</svg>
