          <ellipse class="" cx="66" cy="63.56" rx="47.5" ry="11.56" fill="url(#undersideShade)" opacity="0.34400000000000003"/>
          <ellipse class="" cx="112" cy="61.56" rx="49.4" ry="11.56" fill="url(#undersideShade)" opacity="0.34400000000000003"/>
          <ellipse class="" cx="158" cy="76.84" rx="39.9" ry="8.84" fill="url(#undersideShade)" opacity="0.288"/>
          <ellipse class="" cx="88" cy="97.86" rx="81.7" ry="9.860000000000001" fill="url(#undersideShade)" opacity="0.30400000000000005"/>
          <ellipse class="" cx="148" cy="99.48" rx="55.099999999999994" ry="7.48" fill="url(#undersideShade)" opacity="0.248"/>
          </g>
          <g opacity="0.85" filter="url(#highlightBlur)">
