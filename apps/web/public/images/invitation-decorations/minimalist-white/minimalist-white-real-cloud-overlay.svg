          <ellipse cx="93.6" cy="85.0" rx="93.6" ry="34.0" fill="url(#mistWhite)" opacity="0.72"/>
          <ellipse cx="169.0" cy="90.1" rx="83.2" ry="30.6" fill="url(#mistWhite)" opacity="0.68"/>
        </g>

        <g filter="url(#cloudEdgeDisplace)">
          <g filter="url(#microTexture)">
            <ellipse class="" cx="40" cy="98" rx="50" ry="30" fill="url(#puffWhite)" opacity="0.78"/>
          <ellipse class="" cx="84" cy="72" rx="66" ry="44" fill="url(#puffBright)" opacity="0.9"/>
          <ellipse class="" cx="144" cy="64" rx="72" ry="46" fill="url(#puffBright)" opacity="0.92"/>
          <ellipse class="" cx="210" cy="88" rx="58" ry="36" fill="url(#puffWhite)" opacity="0.82"/>
          <ellipse class="" cx="112" cy="116" rx="116" ry="38" fill="url(#puffWhite)" opacity="0.82"/>
          <ellipse class="" cx="196" cy="122" rx="80" ry="30" fill="url(#puffWarm)" opacity="0.72"/>
          </g>
          <g opacity="0.75" filter="url(#shadeBlur)">
            <ellipse class="" cx="40" cy="108.2" rx="47.5" ry="10.200000000000001" fill="url(#undersideShade)" opacity="0.31200000000000006"/>
          <ellipse class="" cx="84" cy="86.96000000000001" rx="62.699999999999996" ry="14.96" fill="url(#undersideShade)" opacity="0.36000000000000004"/>
          <ellipse class="" cx="144" cy="79.64" rx="68.39999999999999" ry="15.64" fill="url(#undersideShade)" opacity="0.36800000000000005"/>
          <ellipse class="" cx="210" cy="100.24" rx="55.099999999999994" ry="12.24" fill="url(#undersideShade)" opacity="0.328"/>
          <ellipse class="" cx="112" cy="128.92000000000002" rx="110.19999999999999" ry="12.920000000000002" fill="url(#undersideShade)" opacity="0.328"/>
          <ellipse class="" cx="196" cy="132.2" rx="76.0" ry="10.200000000000001" fill="url(#undersideShade)" opacity="0.288"/>
          </g>
          <g opacity="0.85" filter="url(#highlightBlur)">
            <ellipse class="" cx="31.0" cy="89.6" rx="21.0" ry="6.6" fill="#FFFFFF" opacity="0.26520000000000005"/>
          <ellipse class="" cx="131.04" cy="51.12" rx="30.24" ry="10.12" fill="#FFFFFF" opacity="0.3128"/>
          <ellipse class="" cx="91.12" cy="105.36" rx="48.72" ry="8.36" fill="#FFFFFF" opacity="0.2788"/>
          </g>
        </g>

        <path d="M10.4 110.5
                 C44.2 144.5, 98.8 154.7, 148.2 139.4
                 C187.2 127.5, 226.2 136.0, 254.8 108.8
                 C241.8 156.4, 192.4 175.1, 130.0 175.1
                 C62.4 175.1, 18.2 154.7, 10.4 110.5Z"
              fill="url(#bottomMassShade)" opacity="0.58" filter="url(#shadeBlur)"/>
      </g>
    </g>
    
    <g id="cloudXS">
      <g filter="url(#realCloudDropShadow)">
        <g opacity="0.58" filter="url(#mistFeather)">
          <ellipse cx="91.2" cy="72.5" rx="95.0" ry="30.0" fill="url(#mistWhite)"/>
          <ellipse cx="68.4" cy="62.5" rx="68.4" ry="25.0" fill="url(#mistWhite)" opacity="0.72"/>
          <ellipse cx="123.5" cy="66.2" rx="60.8" ry="22.5" fill="url(#mistWhite)" opacity="0.68"/>
        </g>

        <g filter="url(#cloudEdgeDisplace)">
          <g filter="url(#microTexture)">
            <ellipse class="" cx="32" cy="70" rx="38" ry="23" fill="url(#puffWhite)" opacity="0.72"/>
          <ellipse class="" cx="66" cy="52" rx="50" ry="34" fill="url(#puffBright)" opacity="0.86"/>
          <ellipse class="" cx="112" cy="50" rx="52" ry="34" fill="url(#puffBright)" opacity="0.86"/>
          <ellipse class="" cx="158" cy="68" rx="42" ry="26" fill="url(#puffWhite)" opacity="0.72"/>
          <ellipse class="" cx="88" cy="88" rx="86" ry="29" fill="url(#puffWhite)" opacity="0.76"/>
          <ellipse class="" cx="148" cy="92" rx="58" ry="22" fill="url(#puffWarm)" opacity="0.62"/>
          </g>
          <g opacity="0.75" filter="url(#shadeBlur)">
