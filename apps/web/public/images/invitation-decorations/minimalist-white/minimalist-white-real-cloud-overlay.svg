          <ellipse cx="147.6" cy="117.5" rx="147.6" ry="47.0" fill="url(#mistWhite)" opacity="0.72"/>
          <ellipse cx="266.5" cy="124.6" rx="131.2" ry="42.3" fill="url(#mistWhite)" opacity="0.68"/>
        </g>

        <g filter="url(#cloudEdgeDisplace)">
          <g filter="url(#microTexture)">
            <ellipse class="" cx="56" cy="142" rx="72" ry="42" fill="url(#puffWhite)" opacity="0.82"/>
          <ellipse class="" cx="118" cy="104" rx="94" ry="62" fill="url(#puffBright)" opacity="0.94"/>
          <ellipse class="" cx="202" cy="88" rx="102" ry="68" fill="url(#puffBright)" opacity="0.96"/>
          <ellipse class="" cx="298" cy="112" rx="90" ry="58" fill="url(#puffWhite)" opacity="0.9"/>
          <ellipse class="" cx="366" cy="146" rx="70" ry="42" fill="url(#puffWhite)" opacity="0.78"/>
          <ellipse class="" cx="156" cy="168" rx="144" ry="54" fill="url(#puffWhite)" opacity="0.88"/>
          <ellipse class="" cx="270" cy="176" rx="154" ry="56" fill="url(#puffWarm)" opacity="0.84"/>
          <ellipse class="" cx="54" cy="176" rx="62" ry="30" fill="url(#puffWarm)" opacity="0.64"/>
          </g>
          <g opacity="0.75" filter="url(#shadeBlur)">
            <ellipse class="" cx="56" cy="156.28" rx="68.39999999999999" ry="14.280000000000001" fill="url(#undersideShade)" opacity="0.328"/>
          <ellipse class="" cx="118" cy="125.08" rx="89.3" ry="21.080000000000002" fill="url(#undersideShade)" opacity="0.376"/>
          <ellipse class="" cx="202" cy="111.12" rx="96.89999999999999" ry="23.12" fill="url(#undersideShade)" opacity="0.38"/>
          <ellipse class="" cx="298" cy="131.72" rx="85.5" ry="19.720000000000002" fill="url(#undersideShade)" opacity="0.36000000000000004"/>
