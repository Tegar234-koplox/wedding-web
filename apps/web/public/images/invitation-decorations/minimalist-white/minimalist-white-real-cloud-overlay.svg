          <ellipse class="" cx="156" cy="186.36" rx="136.79999999999998" ry="18.360000000000003" fill="url(#undersideShade)" opacity="0.35200000000000004"/>
          <ellipse class="" cx="270" cy="195.04" rx="146.29999999999998" ry="19.040000000000003" fill="url(#undersideShade)" opacity="0.336"/>
          <ellipse class="" cx="54" cy="186.2" rx="58.9" ry="10.200000000000001" fill="url(#undersideShade)" opacity="0.256"/>
          </g>
          <g opacity="0.85" filter="url(#highlightBlur)">
            <ellipse class="" cx="43.04" cy="130.24" rx="30.24" ry="9.24" fill="#FFFFFF" opacity="0.2788"/>
          <ellipse class="" cx="183.64" cy="68.96" rx="42.839999999999996" ry="14.96" fill="#FFFFFF" opacity="0.3264"/>
          <ellipse class="" cx="353.4" cy="134.24" rx="29.4" ry="9.24" fill="#FFFFFF" opacity="0.26520000000000005"/>
          <ellipse class="" cx="242.28" cy="160.32" rx="64.67999999999999" ry="12.32" fill="#FFFFFF" opacity="0.2856"/>
          </g>
        </g>

        <path d="M16.4 152.8
                 C69.7 199.8, 155.8 213.8, 233.7 192.7
                 C295.2 176.2, 356.7 188.0, 401.8 150.4
                 C381.3 216.2, 303.4 242.1, 205.0 242.1
                 C98.4 242.1, 28.7 213.8, 16.4 152.8Z"
              fill="url(#bottomMassShade)" opacity="0.58" filter="url(#shadeBlur)"/>
      </g>
    </g>
    
    <g id="cloudS">
      <g filter="url(#realCloudDropShadow)">
        <g opacity="0.58" filter="url(#mistFeather)">
