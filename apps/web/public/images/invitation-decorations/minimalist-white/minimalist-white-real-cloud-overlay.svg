<?xml version="1.0" encoding="UTF-8"?>
<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Highly realistic white cloud overlay with transparent background">
  <title>Highly Realistic White Cloud Overlay</title>
  <desc>Transparent SVG overlay with realistic soft white clouds using layered gradients, procedural noise, displacement, feathered mist, subtle shadow, and volumetric shading.</desc>

  <defs>
    <radialGradient id="puffBright" cx="38%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="36%" stop-color="#FFFFFF" stop-opacity="0.96"/>
      <stop offset="67%" stop-color="#F3F3F3" stop-opacity="0.82"/>
      <stop offset="100%" stop-color="#DADADA" stop-opacity="0.20"/>
    </radialGradient>

    <radialGradient id="puffWhite" cx="42%" cy="34%" r="78%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.98"/>
      <stop offset="44%" stop-color="#FAFAFA" stop-opacity="0.93"/>
      <stop offset="76%" stop-color="#E9E9E9" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#D1D1D1" stop-opacity="0.16"/>
    </radialGradient>

    <radialGradient id="puffWarm" cx="50%" cy="42%" r="78%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.92"/>
      <stop offset="58%" stop-color="#F2F2F2" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#CFCFCF" stop-opacity="0.10"/>
    </radialGradient>

    <radialGradient id="mistWhite" cx="50%" cy="50%" r="66%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.58"/>
      <stop offset="72%" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="undersideShade" cx="46%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="54%" stop-color="#D7D7D7" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#BDBDBD" stop-opacity="0.46"/>
    </radialGradient>

    <linearGradient id="bottomMassShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="55%" stop-color="#D8D8D8" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#AFAFAF" stop-opacity="0.38"/>
    </linearGradient>

    <!-- Procedural cloud texture: stays SVG, no raster background -->
    <filter id="microTexture" x="-24%" y="-35%" width="154%" height="188%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018 0.028" numOctaves="5" seed="31" result="noise"/>
      <feColorMatrix in="noise" type="matrix"
        values="0 0 0 0 0.96
                0 0 0 0 0.96
                0 0 0 0 0.96
                0 0 0 .18 0" result="softNoise"/>
      <feComposite in="SourceGraphic" in2="softNoise" operator="arithmetic" k1="0" k2="1" k3="0.22" k4="0" result="textured"/>
      <feGaussianBlur in="textured" stdDeviation="0.45"/>
    </filter>

    <!-- Uneven, less-vector edge -->
    <filter id="cloudEdgeDisplace" x="-30%" y="-45%" width="170%" height="210%">
      <feTurbulence type="fractalNoise" baseFrequency="0.010 0.018" numOctaves="4" seed="11" result="edgeNoise"/>
      <feDisplacementMap in="SourceGraphic" in2="edgeNoise" scale="8" xChannelSelector="R" yChannelSelector="G" result="displaced"/>
      <feGaussianBlur in="displaced" stdDeviation="0.25"/>
    </filter>

    <filter id="realCloudDropShadow" x="-35%" y="-50%" width="180%" height="230%">
      <feDropShadow dx="0" dy="11" stdDeviation="15" flood-color="#000000" flood-opacity="0.105"/>
    </filter>

    <filter id="mistFeather" x="-45%" y="-70%" width="210%" height="260%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>

    <filter id="shadeBlur" x="-35%" y="-50%" width="180%" height="220%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>

    <filter id="highlightBlur" x="-30%" y="-40%" width="170%" height="190%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>

    
    <g id="cloudXL">
      <g filter="url(#realCloudDropShadow)">
        <g opacity="0.58" filter="url(#mistFeather)">
          <ellipse cx="268.8" cy="174.0" rx="280.0" ry="72.0" fill="url(#mistWhite)"/>
          <ellipse cx="201.6" cy="150.0" rx="201.6" ry="60.0" fill="url(#mistWhite)" opacity="0.72"/>
          <ellipse cx="364.0" cy="159.0" rx="179.2" ry="54.0" fill="url(#mistWhite)" opacity="0.68"/>
        </g>

        <g filter="url(#cloudEdgeDisplace)">
          <g filter="url(#microTexture)">
            <ellipse class="" cx="72" cy="180" rx="92" ry="52" fill="url(#puffWhite)" opacity="0.86"/>
          <ellipse class="" cx="150" cy="138" rx="120" ry="78" fill="url(#puffBright)" opacity="0.95"/>
          <ellipse class="" cx="250" cy="112" rx="135" ry="88" fill="url(#puffBright)" opacity="0.98"/>
          <ellipse class="" cx="380" cy="124" rx="128" ry="82" fill="url(#puffWhite)" opacity="0.94"/>
          <ellipse class="" cx="486" cy="170" rx="105" ry="58" fill="url(#puffWhite)" opacity="0.86"/>
          <ellipse class="" cx="178" cy="210" rx="180" ry="70" fill="url(#puffWhite)" opacity="0.92"/>
          <ellipse class="" cx="330" cy="218" rx="210" ry="76" fill="url(#puffWarm)" opacity="0.9"/>
          <ellipse class="" cx="456" cy="235" rx="142" ry="54" fill="url(#puffWarm)" opacity="0.76"/>
          <ellipse class="" cx="82" cy="226" rx="85" ry="38" fill="url(#puffWarm)" opacity="0.7"/>
          </g>
          <g opacity="0.75" filter="url(#shadeBlur)">
            <ellipse class="" cx="72" cy="197.68" rx="87.39999999999999" ry="17.68" fill="url(#undersideShade)" opacity="0.34400000000000003"/>
          <ellipse class="" cx="150" cy="164.52" rx="114.0" ry="26.520000000000003" fill="url(#undersideShade)" opacity="0.38"/>
          <ellipse class="" cx="250" cy="141.92000000000002" rx="128.25" ry="29.92" fill="url(#undersideShade)" opacity="0.38"/>
          <ellipse class="" cx="380" cy="151.88" rx="121.6" ry="27.880000000000003" fill="url(#undersideShade)" opacity="0.376"/>
          <ellipse class="" cx="486" cy="189.72" rx="99.75" ry="19.720000000000002" fill="url(#undersideShade)" opacity="0.34400000000000003"/>
          <ellipse class="" cx="178" cy="233.8" rx="171.0" ry="23.8" fill="url(#undersideShade)" opacity="0.36800000000000005"/>
          <ellipse class="" cx="330" cy="243.84" rx="199.5" ry="25.840000000000003" fill="url(#undersideShade)" opacity="0.36000000000000004"/>
          <ellipse class="" cx="456" cy="253.36" rx="134.9" ry="18.360000000000003" fill="url(#undersideShade)" opacity="0.30400000000000005"/>
          <ellipse class="" cx="82" cy="238.92000000000002" rx="80.75" ry="12.920000000000002" fill="url(#undersideShade)" opacity="0.27999999999999997"/>
          </g>
          <g opacity="0.85" filter="url(#highlightBlur)">
            <ellipse class="" cx="55.44" cy="165.44" rx="38.64" ry="11.44" fill="#FFFFFF" opacity="0.2924"/>
          <ellipse class="" cx="225.7" cy="87.36" rx="56.699999999999996" ry="19.36" fill="#FFFFFF" opacity="0.3332"/>
          <ellipse class="" cx="467.1" cy="153.76" rx="44.1" ry="12.76" fill="#FFFFFF" opacity="0.2924"/>
          <ellipse class="" cx="292.2" cy="196.72" rx="88.2" ry="16.72" fill="#FFFFFF" opacity="0.30600000000000005"/>
          <ellipse class="" cx="66.7" cy="215.36" rx="35.699999999999996" ry="8.36" fill="#FFFFFF" opacity="0.238"/>
          </g>
        </g>

        <path d="M22.4 195.0
                 C95.2 255.0, 212.8 273.0, 319.2 246.0
                 C403.2 225.0, 487.2 240.0, 548.8 192.0
                 C520.8 276.0, 414.4 309.0, 280.0 309.0
                 C134.4 309.0, 39.2 273.0, 22.4 195.0Z"
              fill="url(#bottomMassShade)" opacity="0.58" filter="url(#shadeBlur)"/>
      </g>
    </g>
    
    <g id="cloudM">
      <g filter="url(#realCloudDropShadow)">
        <g opacity="0.58" filter="url(#mistFeather)">
