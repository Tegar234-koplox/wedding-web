<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1" name="viewport" />
    <meta content="#0b0b09" name="theme-color" />
    <title>Niskala · Tidak ada koneksi internet</title>
    <style>
      * { box-sizing: border-box; }
      body {
        display: grid;
        min-height: 100vh;
        min-height: 100dvh;
        margin: 0;
        place-items: center;
        padding: 2rem;
        background: radial-gradient(circle at 50% 30%, rgb(213 173 85 / 12%), transparent 34rem), #0b0b09;
        color: #f7f1e6;
        font-family: "Helvetica Neue", "Segoe UI", Arial, sans-serif;
        text-align: center;
      }
      main {
        display: grid;
        width: min(100%, 36rem);
        justify-items: center;
        gap: 1rem;
      }
      .brand {
        margin: 0;
        color: #d5ad55;
        font-size: 0.65rem;
        font-weight: 700;
        letter-spacing: 0.3em;
        text-transform: uppercase;
      }
      img { width: min(100%, 19rem); height: auto; }
      h1 { margin: 0; font-family: Georgia, serif; font-size: clamp(1.8rem, 6vw, 3rem); font-weight: 400; }
      p { max-width: 29rem; margin: 0; color: rgb(255 255 255 / 58%); font-size: 0.86rem; line-height: 1.7; }
      button {
        min-height: 2.8rem;
        margin-top: 0.75rem;
        border: 1px solid #d5ad55;
        background: transparent;
        color: #f7f1e6;
        padding: 0.7rem 1.1rem;
        font: inherit;
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="brand">Niskala</p>
      <img alt="Ilustrasi perangkat tanpa koneksi internet" height="1477" src="/preloader/no-connection.png" width="1536" />
      <h1>Tidak ada koneksi internet...</h1>
      <p>Sambungkan perangkat ke internet untuk melanjutkan, lalu coba muat ulang halaman ini.</p>
      <button onclick="window.location.reload()" type="button">Coba lagi</button>
    </main>
  </body>
</html>
